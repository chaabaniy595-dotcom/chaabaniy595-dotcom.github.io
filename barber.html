<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior Barber - Saif</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

:root {
    /* Premium Palette */
    --bg-color: #1a1a1d;         /* Almost Black */
    --card-bg: #2d2d34;          /* Dark Charcoal */
    --text-color: #f5f5f5;       /* White Smoke */
    --accent-color: #d4af37;     /* Metallic Gold */
    --accent-hover: #b39028;     /* Darker Gold */
    --secondary: #950740;        /* Deep Crimson (optional accent) */
    --shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
    font-family: "Poppins", sans-serif;
}

body {
    background-color: var(--bg-color);
    background-image: radial-gradient(circle at 50% 50%, #25252b 0%, #1a1a1d 100%);
    color: var(--text-color);
    line-height: 1.6;
}

/* Header & Nav */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 5%;
    background-color: rgba(26, 26, 29, 0.95);
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

.logo {
    height: 60px;
    width: auto;
    filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
}

.navigation ul {
    display: flex;
    gap: 2rem;
    list-style: none;
}

.navigation a {
    text-decoration: none;
    color: var(--text-color);
    font-weight: 500;
    transition: all 0.3s;
    position: relative;
}

.navigation a:hover {
    color: var(--accent-color);
    text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
}

/* Hero Section */
.hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 8rem 1rem;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('12.jpg');
    background-size: cover;
    background-position: center;
    min-height: 70vh;
    justify-content: center;
    border-bottom: 3px solid var(--accent-color);
}

.hero h1 {
    font-size: 3.5rem;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    letter-spacing: 3px;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
}

.hero .title {
    color: var(--accent-color);
    font-size: 4.5rem;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
}

.hero p {
    font-size: 1.3rem;
    margin-bottom: 2.5rem;
    max-width: 600px;
    opacity: 0.9;
}

.btn {
    display: inline-block;
    padding: 1rem 2.5rem;
    background: linear-gradient(45deg, var(--accent-color), #f3c648);
    color: #1a1a1d;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.3s, box-shadow 0.3s;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}

.btn:hover {
    background: linear-gradient(45deg, #f3c648, var(--accent-color));
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.8);
}

/* Section Styling */
section {
    padding: 5rem 5%;
}

.section-title {
    text-align: center;
    font-size: 3rem;
    margin-bottom: 4rem;
    color: var(--accent-color);
    text-transform: uppercase;
    position: relative;
    letter-spacing: 2px;
}

.section-title::after {
    content: '';
    display: block;
    width: 80px;
    height: 4px;
    background: var(--text-color);
    margin: 15px auto 0;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

/* Video Gallery */
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2rem;
    margin-top: 2rem;
}

.video-item video {
    width: 100%;
    border-radius: 15px;
    box-shadow: var(--shadow);
    border: 2px solid #333;
    transition: border-color 0.3s;
}

.video-item video:hover {
    border-color: var(--accent-color);
}

/* Reservation Form */
.reservation-container {
    background-color: var(--card-bg);
    padding: 3rem;
    border-radius: 20px;
    max-width: 650px;
    margin: 0 auto;
    box-shadow: var(--shadow);
    border: 1px solid rgba(212, 175, 55, 0.1);
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.8rem;
    font-weight: 600;
    color: var(--accent-color);
}

.form-group input, .form-group select {
    width: 100%;
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid #444;
    background-color: #1a1a1d;
    color: white;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--accent-color);
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    backdrop-filter: blur(5px);
    align-items: center;
    justify-content: center;
}

.modal-content {
    background-color: var(--card-bg);
    padding: 3rem;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    position: relative;
    border: 1px solid var(--accent-color);
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 25px;
    font-size: 2.5rem;
    cursor: pointer;
    color: var(--text-color);
    transition: color 0.3s;
}

.close-btn:hover {
    color: var(--accent-color);
}

/* Responsive */
@media (max-width: 768px) {
    .hero h1 { font-size: 2.5rem; }
    .hero .title { font-size: 3rem; }
    .navigation ul { display: none; }
    section { padding: 3rem 5%; }
}
    </style>
</head>
<body>

    <header>
        <img src="1.png" alt="House Warriors Logo" class="logo">
        <nav class="navigation">
            <ul>
                <li><a href="#portfolio">Portfolio</a></li>
                <li><a href="#reservation">Book Now</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="barber-hero">
        <h1 class="title">Warrior Barber</h1>
        <a href="#reservation" class="btn">Book Appointment</a>
    </section>

    <section id="portfolio">
        <h2 class="section-title">Latest Cuts</h2>
        <div id="video-gallery" class="video-grid">
            <div class="video-item">
                <video controls muted preload="metadata">
                    <source src="saif1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="video-item">
                <video controls muted preload="metadata">
                    <source src="saif2.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="video-item">
                <video controls muted preload="metadata">
                    <source src="saif3.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </section>

    <section id="reservation">
        <h2 class="section-title">Book an Appointment</h2>
        <div class="reservation-container">
            <form id="booking-form">
                <div class="form-group">
                    <label for="client-name">Your Name</label>
                    <input type="text" id="client-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="client-phone">Phone Number</label>
                    <input type="tel" id="client-phone" required placeholder="+216 12345678">
                </div>
                <div class="form-group">
                    <label for="booking-date">Date</label>
                    <input type="date" id="booking-date" required>
                </div>
                <div class="form-group">
                    <label for="booking-time">Time</label>
                    <select id="booking-time" required>
                        <option value="">Select Time</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="11:00">11:00 AM</option>
                        <option value="12:00">12:00 PM</option>
                        <option value="13:00">01:00 PM</option>
                        <option value="14:00">02:00 PM</option>
                        <option value="15:00">03:00 PM</option>
                        <option value="16:00">04:00 PM</option>
                        <option value="17:00">05:00 PM</option>
                        <option value="18:00">06:00 PM</option>
                        <option value="19:00">07:00 PM</option>
                        <option value="20:00">08:00 PM</option>
                    </select>
                </div>
                <input type="hidden" id="selected-barber" value="Saif">
                <button type="submit" class="btn" style="width: 100%;">Confirm Booking</button>
            </form>
        </div>
    </section>

    <!-- Modal for Success -->
    <div id="success-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('success-modal').style.display='none'">&times;</span>
            <i class="fas fa-check-circle" style="color: var(--accent-color); font-size: 4rem; margin-bottom: 1rem;"></i>
            <h2>Booking Confirmed!</h2>
            <p>Thank you, <span id="modal-client-name"></span>.</p>
            <p>Your appointment with <span id="modal-barber-name"></span> is set for <span id="modal-date"></span> at <span id="modal-time"></span>.</p>
            <br>
            <button onclick="document.getElementById('success-modal').style.display='none'" class="btn">Close</button>
        </div>
    </div>

    <footer>
        <div style="text-align: center; padding: 2rem; opacity: 0.7;">
            <p>&copy; 2025 House Warriors Barber Shop. All rights reserved.</p>
        </div>
    </footer>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // Initialize Booking Form
    const bookingForm = document.getElementById('booking-form');
    if (bookingForm) {
        bookingForm.addEventListener('submit', handleBookingSubmit);

        // Pre-set date to today
        const dateInput = document.getElementById('booking-date');
        if(dateInput) {
            dateInput.min = new Date().toISOString().split('T')[0];
            dateInput.addEventListener('change', updateAvailableTimes);
        }
    }
});

function updateAvailableTimes() {
    const date = document.getElementById('booking-date').value;
    const barber = document.getElementById('selected-barber').value;
    const timeSelect = document.getElementById('booking-time');

    if (!date || !barber) return;

    // Reset all options first
    Array.from(timeSelect.options).forEach(option => {
        option.disabled = false;
        if (option.textContent.includes('(Booked)')) {
            option.textContent = option.textContent.replace(' (Booked)', '');
        }
    });

    const db = JSON.parse(localStorage.getItem('warrior_reservations')) || [];
    const bookedTimes = db
        .filter(res => res.barber === barber && res.date === date)
        .map(res => res.time);

    Array.from(timeSelect.options).forEach(option => {
        if (bookedTimes.includes(option.value)) {
            option.disabled = true;
            option.textContent += ' (Booked)';
        }
    });
}

function handleBookingSubmit(e) {
    e.preventDefault();

    const name = document.getElementById('client-name').value;
    const phone = document.getElementById('client-phone').value;
    const date = document.getElementById('booking-date').value;
    const time = document.getElementById('booking-time').value;
    const barber = document.getElementById('selected-barber').value;

    // Check for conflict
    if (isSlotTaken(barber, date, time)) {
        alert(`Sorry, ${barber} is already booked on ${date} at ${time}. Please choose another time.`);
        return;
    }

    const reservation = {
        id: Date.now(),
        name,
        phone,
        date,
        time,
        barber,
        createdAt: new Date().toISOString()
    };

    saveReservation(reservation);
    showSuccessModal(reservation);
    e.target.reset();
}

function isSlotTaken(barber, date, time) {
    const db = JSON.parse(localStorage.getItem('warrior_reservations')) || [];
    return db.some(res =>
        res.barber === barber &&
        res.date === date &&
        res.time === time
    );
}

function saveReservation(reservation) {
    let db = JSON.parse(localStorage.getItem('warrior_reservations')) || [];
    db.push(reservation);
    localStorage.setItem('warrior_reservations', JSON.stringify(db));

    console.log("New Reservation Saved to DB:", reservation);
    console.log("Current Database State:", db);
}

function showSuccessModal(data) {
    document.getElementById('modal-client-name').textContent = data.name;
    document.getElementById('modal-barber-name').textContent = data.barber;
    document.getElementById('modal-date').textContent = data.date;
    document.getElementById('modal-time').textContent = data.time;

    const modal = document.getElementById('success-modal');
    modal.style.display = 'flex';
}
    </script>
</body>
</html>
